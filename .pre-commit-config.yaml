# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
    - repo: "https://github.com/pre-commit/pre-commit-hooks"
      rev: "v3.2.0"
      hooks:
          - id: "trailing-whitespace"
          - id: "end-of-file-fixer"
          - id: "check-yaml"
    - repo: "https://github.com/astral-sh/ruff-pre-commit"
      rev: "v0.15.4"
      hooks:
          - id: "ruff-check"
          - id: "ruff-format"
    - repo: "local"
      hooks:
          - id: "copy"
            name: "vendor alfred-results"
            entry: "make copy"
            language: "system"
            always_run: true
          - id: "cleanup"
            name: "clean up __pycache__"
            entry: "make cleanup"
            language: "system"
            always_run: true
          - id: "ty"
            name: "ty check"
            entry: "ty check"
            files: "^src/.*\\.py$"
            language: "system"
            always_run: true
